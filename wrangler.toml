name = "resturentmenu"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

pages_build_output_dir = "./dist"

[[d1_databases]]
binding = "DB"
database_name = "restaurant_menu"
database_id = "3394c601-9c24-4dfd-b68a-78ac300c9d95"

# R2 image storage — bucket: menumate-images (public access enabled)
# Public URL: https://pub-e4f1902f0d554dc3a20f5476bf1adcfb.r2.dev
[[r2_buckets]]
binding = "R2"
bucket_name = "menumate-images"

# R2 public base URL — used by upload worker to build image URLs
[vars]
R2_PUBLIC_URL = "https://pub-e4f1902f0d554dc3a20f5476bf1adcfb.r2.dev"
